<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/calculator.css"/>
</head>

<body>
    <div id="outter_container">
        <div id="inner_container">
            <div id="calculating_area">
    
            </div>
            <button id="Modulus" class="hover symbol" >%</button>
            <button id="Clear" class="hover">C</button>
            <button id="Delete" class="hover">DEL</button>
            <button id="Division" class="hover symbol">/</button>
            <button id="Num-1" class="hover number">1</button>
            <button id="Num-2" class="hover number">2</button>
            <button id="Num-3" class="hover number">3</button>
            <button id="Addition" class="hover symbol">+</button>
            <button id="Num-4" class="hover number">4</button>
            <button id="Num-5" class="hover number">5</button>
            <button id="Num-6" class="hover number">6</button>
            <button id="Subraction" class="hover symbol">-</button>
            <button id="Num-7" class="hover number">7</button>
            <button id="Num-8" class="hover number">8</button>
            <button id="Num-9" class="hover number">9</button>
            <button id="Multiplication " class="hover symbol">*</button>
            <button id="Num-00" class="hover number">00</button>
            <button id="Num-0" class="hover number">0</button>
            <button id="dot" class="hover number">.</button>
            <button id="Answer" class="hover">=</button>
    
        </div>
    
    </div>

<script src="/js/calculator.js"></script>
</body>

</html>
